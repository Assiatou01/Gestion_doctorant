spring.application.name=cartographie-doctorants-edmi
server.port=8080

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.web.resources.static-locations=classpath:/static/

# Taille max des fichiers uploadés
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


logging.level.org.springframework.security=DEBUG
logging.level.esmt.sn.cartographiedoctorantsedmi=DEBUG

spring.datasource.hikari.maximum-pool-size=10


spring.datasource.url=jdbc:postgresql://localhost:5432/cartographie_doctorants
spring.datasource.username=postgres
spring.datasource.password=passer
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
# Admin par défaut (surchargeable par variables d'environnement)
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}